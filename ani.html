<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>


        body{
            width: 100%;
            height: 100%;
        }
        .container{
            position: relative;
            width: 100%;
            height: 100%;
        }
        .ani{
            background-color: brown;
            position: absolute;
            left: 100px;
            top: 100px;
            width: 100px;
            height: 100px;
            border: 10px solid rgb(51, 255, 0);
            border-top: 20px solid rgb(58, 35, 142);


            animation: anima 10s linear infinite;
        }

        @keyframes anima {
            to{
                transform: rotate(360deg);
            }
        }

    </style>
</head>
<body>
    <div class="container"><div class="ani"></div></div>

    <div class="cont">

        <div class="texto">
            <p>horonoa zovo</p>
        </div>
    </div>
    

</body>
</html>
